# Render blueprint for the Quincy indexer (background worker).
# Deploy: push to GitHub, then New > Blueprint on render.com and pick this repo.
services:
  - type: worker
    name: quincy-indexer
    runtime: docker
    dockerfilePath: ./indexer/Dockerfile
    dockerContext: ./indexer
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CELO_RPC_URL
        value: https://forno.celo.org
      - key: QUINCY_ADDRESS
        value: "0x9af5fbb05054a4d072def7bb73978c48dfe6d3d5"
      - key: START_BLOCK
        value: "72544655"
      - key: POLL_INTERVAL_MS
        value: "15000"
      - key: BLOCK_RANGE
        value: "2000"
